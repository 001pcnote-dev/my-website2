<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>SmartPrint - 印刷・PDF出力プレビュー</title>
    
    <script src="./js/tailwindcss.js"></script>
    <script src="./js/marked.min.js"></script>
    <script src="./js/purify.min.js"></script>
    <script src="./js/html2pdf.bundle.min.js"></script>
    <link rel="stylesheet" href="./css/all.min.css"/>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f172a">

    <style>
        /* --- ローカル日本語フォントの定義 (.ttf形式) --- */
        @font-face {
            font-family: 'LocalNotoSans';
            src: url('./fonts/NotoSansJP-Regular.ttf') format('truetype');
            font-weight: 400;
        }
        @font-face {
            font-family: 'LocalNotoSans';
            src: url('./fonts/NotoSansJP-Bold.ttf') format('truetype');
            font-weight: 700;
        }
        @font-face {
            font-family: 'LocalNotoSerif';
            src: url('./fonts/NotoSerifJP-Regular.ttf') format('truetype');
            font-weight: 400;
        }

        /* アプリ全体のフォント設定 */
        body { font-family: 'LocalNotoSans', sans-serif; background-color: #f1f5f9; }
        
        /* プレビューエリアの基本スタイル */
        .preview-wrapper { width: 100%; display: flex; justify-content: center; align-items: flex-start; position: relative; }
        .paper-preview {
            background: white; box-shadow: 0 4px 15px rgba(0,0,0,0.1); box-sizing: border-box;
            position: relative; display: flex; flex-direction: column; transform-origin: top center; flex-shrink: 0; overflow: hidden;
        }
        .paper-preview.portrait { width: 210mm; height: 297mm; }
        .paper-preview.landscape { width: 297mm; height: 210mm; }

        [contenteditable="true"]:hover { background-color: #f8fafc; cursor: text; }
        [contenteditable="true"]:focus { background-color: #f1f5f9; outline: 2px solid #6366f1; outline-offset: 2px; }

        /* テンプレート用フォント指定 */
        .tmpl-mincho { font-family: 'LocalNotoSerif', serif; }
        .tmpl-japanese-modern { font-family: 'LocalNotoSerif', serif; writing-mode: vertical-rl; text-orientation: mixed; }
        .tmpl-japanese-modern .article-body { line-height: 2.2; }
        .tmpl-japanese-modern .header-line { border-bottom: none !important; border-left: 2px solid #1e293b; padding-left: 8px; margin-left: 12px; flex-direction: column; align-items: flex-start; }

        /* フレームマスクレイアウト用 */
        .tmpl-frame-mask .grid-cell-box { background: transparent; border: none !important; }
        .tmpl-frame-mask .frame-wrapper {
            resize: none !important;
            overflow: hidden;
            position: relative;
            width: 100%;
            height: 100%;
            min-width: 50px; min-height: 50px;
            border: 1px dashed #94a3b8;
            display: flex; align-items: center; justify-content: center;
        }
        .tmpl-frame-mask .frame-wrapper:hover { border-color: #3b82f6; }
        
        .frame-wrapper .resize-handle {
            position: absolute;
            right: 0;
            bottom: 0;
            width: 30px;
            height: 30px;
            cursor: se-resize;
            background: linear-gradient(135deg, transparent 50%, rgba(99, 102, 241, 0.8) 50%);
            z-index: 30;
            touch-action: none;
        }
        .frame-wrapper .resize-handle:hover {
            background: linear-gradient(135deg, transparent 50%, rgba(79, 70, 229, 1) 50%);
        }

        .pan-zoom-img {
            position: absolute;
            cursor: grab;
            transform-origin: center;
            max-width: none !important;
            max-height: none !important;
            touch-action: none;
        }
        .pan-zoom-img:active { cursor: grabbing; }

        /* 印刷・PDF用CSS */
        @media print {
            @page { margin: 0; size: auto; }
            html, body { 
                width: 100% !important; height: auto !important; overflow: visible !important; 
                background: white !important; color: black !important; margin: 0 !important; padding: 0 !important; position: static !important;
            }
            .no-print { display: none !important; }
            .print-area { padding: 0 !important; margin: 0 !important; width: 100% !important; display: block !important; }
            
            #preview-container { display: block !important; width: 100% !important; margin: 0 !important; padding: 0 !important; }
            .preview-wrapper { 
                display: block !important; width: 100% !important; height: auto !important; margin: 0 !important; padding: 0 !important; 
                page-break-after: always !important; break-after: page !important;
                page-break-inside: avoid !important; break-inside: avoid !important;
            }
            .preview-wrapper:last-child { page-break-after: auto !important; break-after: auto !important; }
            
            .paper-preview { 
                box-shadow: none !important; margin: 0 auto !important; display: flex !important; transform: none !important; 
                overflow: hidden !important; box-sizing: border-box !important;
            }
            .paper-preview.portrait { width: 210mm !important; height: 297mm !important; }
            .paper-preview.landscape { width: 297mm !important; height: 210mm !important; }
            
            .tmpl-frame-mask .frame-wrapper { border: none !important; }
            .frame-wrapper .resize-handle { display: none !important; }
            
            [contenteditable="true"]:focus { outline: none !important; background-color: transparent !important; }
        }
    </style>
</head>
<body class="flex flex-col h-[100dvh] overflow-hidden">

    <header class="no-print bg-slate-900 text-white p-4 flex items-center justify-between shadow-md shrink-0 z-50 relative">
        <div class="flex items-center space-x-3">
            <button onclick="toggleMobileMenu()" class="sm:hidden text-white hover:text-indigo-300 transition-colors focus:outline-none p-1">
                <i class="fa-solid fa-bars text-xl"></i>
            </button>
            <h1 class="text-sm sm:text-lg font-bold tracking-wider">SmartPrint</h1>
        </div>
        <div class="flex items-center space-x-2 sm:space-x-4">
            <button onclick="document.getElementById('image-upload').click()" class="bg-teal-700 hover:bg-teal-600 px-4 py-2 rounded-lg text-sm font-medium flex items-center">
                <i class="fa-solid fa-image sm:mr-2 text-teal-200"></i><span class="hidden sm:inline">画像ファイル追加</span>
            </button>
            <input type="file" id="image-upload" multiple accept="image/*" class="hidden" onchange="handleImageUpload(event)">
            
            <button onclick="selectSyncFolder()" class="bg-slate-700 hover:bg-slate-600 px-4 py-2 rounded-lg text-sm font-medium flex items-center">
                <i class="fa-solid fa-folder-open sm:mr-2 text-amber-400"></i><span class="hidden sm:inline">フォルダ選択</span>
            </button>
            <button id="btn-print" onclick="window.print()" disabled class="bg-indigo-600 hover:bg-indigo-500 disabled:bg-slate-700 px-4 py-2 rounded-lg text-sm font-bold flex items-center">
                <i class="fa-solid fa-print sm:mr-2"></i><span class="hidden sm:inline">ブラウザ印刷</span>
            </button>
            <button id="btn-export-pdf" onclick="exportDirectPDF()" disabled class="bg-emerald-600 hover:bg-emerald-500 disabled:bg-slate-700 px-4 py-2 rounded-lg text-sm font-bold flex items-center">
                <i class="fa-solid fa-file-pdf sm:mr-2"></i><span class="hidden sm:inline">PDF保存</span>
            </button>
        </div>
    </header>

    <div class="flex flex-1 overflow-hidden relative">
        <div id="mobile-menu-backdrop" onclick="toggleMobileMenu()" class="absolute inset-0 bg-slate-900/50 z-40 opacity-0 pointer-events-none transition-opacity duration-300 sm:hidden"></div>

        <aside id="sidebar-menu" class="no-print absolute sm:relative z-50 w-72 sm:w-80 h-full bg-white border-r border-slate-200 overflow-y-auto shrink-0 transition-transform duration-300 transform -translate-x-full sm:translate-x-0 shadow-2xl sm:shadow-none">
            <div class="p-4 pb-32 space-y-5">
                <div class="flex justify-between items-center sm:hidden pb-2 border-b border-slate-100">
                    <span class="font-bold text-slate-700 text-sm">メニュー</span>
                    <button onclick="toggleMobileMenu()" class="text-slate-400 hover:text-slate-600 p-2">
                        <i class="fa-solid fa-xmark text-lg"></i>
                    </button>
                </div>

                <div class="space-y-3 pt-1">
                    <h4 class="text-xs font-bold text-slate-500 uppercase tracking-wider">用紙設定</h4>
                    <div>
                        <label class="block text-[11px] text-slate-600 mb-1">1ページの掲載日数(マス数)</label>
                        <select id="input-days-per-page" onchange="renderPreview()" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-2.5 text-sm font-bold">
                            <option value="1">1マス表示 (全体)</option>
                            <option value="2">2分割表示</option>
                            <option value="3">3分割表示</option>
                            <option value="4">4分割表示 (2×2)</option>
                            <option value="6">6分割表示</option>
                            <option value="9">9分割表示</option>
                        </select>
                    </div>
                    <div class="grid grid-cols-2 gap-2">
                        <button onclick="changeOrientation('portrait')" id="orient-btn-portrait" class="orient-btn border-2 border-indigo-600 bg-indigo-50 text-indigo-900 py-2 rounded-xl text-xs font-bold transition-all"><i class="fa-solid fa-file mr-1.5"></i>縦向き</button>
                        <button onclick="changeOrientation('landscape')" id="orient-btn-landscape" class="orient-btn border border-slate-200 text-slate-600 py-2 rounded-xl text-xs font-medium transition-all"><i class="fa-solid fa-file mr-1.5 rotate-90"></i>横向き</button>
                    </div>
                </div>

                <div class="space-y-2 pt-3 border-t border-slate-100">
                    <h4 class="text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">デザインテンプレート</h4>
                    <select id="input-template" onchange="changeTemplate(this.value)" class="w-full bg-indigo-50 border border-indigo-200 text-indigo-900 rounded-xl p-2.5 text-sm font-bold focus:outline-none focus:border-indigo-400">
                        <option value="standard">スタンダード</option>
                        <option value="elegant">エレガント (明朝体)</option>
                        <option value="minimal">ミニマル (枠なし)</option>
                        <option value="modern-jp">和モダン (縦書き)</option>
                        <option value="frame-mask">フレームマスク (自由枠)</option>
                    </select>
                </div>

                <div class="space-y-5 pt-5 border-t border-slate-100 mt-4">
                    <h4 class="text-xs font-bold text-slate-500 uppercase tracking-wider">詳細設定</h4>
                    
                    <div class="space-y-2">
                        <label class="flex items-center justify-between bg-white p-2.5 rounded-lg border border-slate-200 cursor-pointer hover:bg-slate-50 transition-colors">
                            <span class="text-xs font-bold text-slate-700 select-none">タイトルの表示</span>
                            <div class="relative inline-flex items-center">
                                <input type="checkbox" id="switch-show-title" checked onchange="renderPreview()" class="sr-only peer">
                                <div class="w-9 h-5 bg-slate-200 rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-slate-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-indigo-600"></div>
                            </div>
                        </label>
                        <label class="flex items-center justify-between bg-white p-2.5 rounded-lg border border-slate-200 cursor-pointer hover:bg-slate-50 transition-colors">
                            <span class="text-xs font-bold text-slate-700 select-none">本文の表示</span>
                            <div class="relative inline-flex items-center">
                                <input type="checkbox" id="switch-show-text" checked onchange="renderPreview()" class="sr-only peer">
                                <div class="w-9 h-5 bg-slate-200 rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-slate-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-indigo-600"></div>
                            </div>
                        </label>
                        <label class="flex items-center justify-between bg-white p-2.5 rounded-lg border border-slate-200 cursor-pointer hover:bg-slate-50 transition-colors">
                            <span class="text-xs font-bold text-slate-700 select-none">フッターの表示</span>
                            <div class="relative inline-flex items-center">
                                <input type="checkbox" id="switch-show-footer" checked onchange="renderPreview()" class="sr-only peer">
                                <div class="w-9 h-5 bg-slate-200 rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-slate-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-indigo-600"></div>
                            </div>
                        </label>
                    </div>

                    <div class="space-y-3">
                        <div>
                            <label class="block text-[10px] text-slate-600 mb-1 font-medium">タイトルの大きさ</label>
                            <select id="input-title-size" onchange="renderPreview()" class="w-full bg-white border border-slate-200 rounded-lg p-1.5 text-[11px] focus:outline-none focus:border-indigo-400">
                                <option value="0.875rem">さらに小さめ (14px)</option>
                                <option value="1.125rem">小さめ (18px)</option>
                                <option value="1.5rem" selected>標準 (24px)</option>
                                <option value="1.875rem">大きめ (30px)</option>
                                <option value="2.25rem">特大 (36px)</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-[10px] text-slate-600 mb-1 font-medium">テキストと画像の比率</label>
                            <select id="input-box-ratio" onchange="renderPreview()" class="w-full bg-white border border-slate-200 rounded-lg p-1.5 text-[11px] focus:outline-none focus:border-indigo-400">
                                <option value="1:1" selected>均等 (テキスト1 : 画像1)</option>
                                <option value="2:1">テキストを広く (2 : 1)</option>
                                <option value="3:1">テキストをさらに広く (3 : 1)</option>
                                <option value="1:2">画像を広く (1 : 2)</option>
                                <option value="1:3">画像をさらに広く (1 : 3)</option>
                                <option value="1:4">画像を最大に (1 : 4)</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-[10px] text-slate-600 mb-1 font-medium">画像・テキストの配置方向</label>
                            <select id="input-layout-mode" onchange="renderPreview()" class="w-full bg-white border border-slate-200 rounded-lg p-1.5 text-[11px] focus:outline-none focus:border-indigo-400">
                                <option value="text-top">テキスト上 / 画像下 (標準)</option>
                                <option value="img-top">画像上 / テキスト下</option>
                                <option value="text-left">テキスト左 / 画像右 (横並び)</option>
                                <option value="img-left">画像左 / テキスト右 (横並び)</option>
                            </select>
                        </div>
                    </div>

                    <div class="space-y-4">
                        <div>
                            <div class="flex justify-between text-[10px] font-bold text-slate-400 mb-1"><span>基本文字サイズ</span><span id="val-font-size" class="text-indigo-500">14px</span></div>
                            <input type="range" id="input-font-size" min="10" max="24" value="14" oninput="updateLayoutStyles()" class="w-full accent-indigo-500 h-1.5 bg-slate-200 rounded-lg appearance-none cursor-pointer">
                        </div>
                        <div>
                            <div class="flex justify-between text-[10px] font-bold text-slate-400 mb-1"><span>ページ余白</span><span id="val-padding" class="text-indigo-500">15mm</span></div>
                            <input type="range" id="input-padding" min="5" max="30" value="15" oninput="updateLayoutStyles()" class="w-full accent-indigo-500 h-1.5 bg-slate-200 rounded-lg appearance-none cursor-pointer">
                        </div>
                    </div>
                </div>
            </div>
        </aside>

        <main id="preview-main-area" class="flex-1 bg-slate-200 overflow-y-auto p-4 pb-32 md:p-8 md:pb-32 flex flex-col items-center print-area">
            <div id="preview-container" class="w-full space-y-6 print:space-y-0">
                <div id="guide-card" class="no-print bg-white rounded-2xl p-8 text-center max-w-md mx-auto my-12 shadow-sm border border-slate-200">
                    <i class="fa-solid fa-print text-4xl text-indigo-400 mb-4"></i>
                    <h3 class="font-bold text-slate-800">SmartPrint</h3>
                    <p class="text-sm text-slate-500 mt-2 mb-6">SmartDiaryから連携されたデータ、または個別の画像を読み込みます。</p>
                    
                    <button onclick="selectSyncFolder()" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white px-4 py-3 rounded-xl text-sm font-bold shadow-md shadow-indigo-200 transition-all mb-3">
                        連携フォルダを選択して読み込む
                    </button>
                    <button onclick="document.getElementById('image-upload').click()" class="w-full bg-slate-100 hover:bg-slate-200 text-slate-700 border border-slate-300 px-4 py-3 rounded-xl text-sm font-bold transition-all">
                        画像ファイルだけを個別に読み込む
                    </button>
                </div>
            </div>
        </main>
    </div>

    <script>
        let dirHandle = null, exportedData = null;     
        let currentTemplate = 'standard', currentOrientation = 'portrait'; 
        const imageBlobUrls = {}; 
        let footerCustomText = "ここをクリックして好きな文字を入力できます";
        
        let cellTextVisibility = {}; 
        let cellFontSize = {};
        let cellRatio = {};
        let cellLayout = {}; 

        window.addEventListener('DOMContentLoaded', async () => {
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('sw.js').catch(err => {
                    console.log('Service Worker 登録失敗: ', err);
                });
            }
        });

        // モバイルメニューの開閉
        function toggleMobileMenu() {
            const sidebar = document.getElementById('sidebar-menu');
            const backdrop = document.getElementById('mobile-menu-backdrop');
            
            sidebar.classList.toggle('-translate-x-full');
            backdrop.classList.toggle('opacity-0');
            backdrop.classList.toggle('pointer-events-none');
        }

        // 個別画像の読み込み処理
        function handleImageUpload(event) {
            const files = event.target.files;
            if(!files || files.length === 0) return;
            
            if(!exportedData) exportedData = { chapters: [] };

            for(let i = 0; i < files.length; i++) {
                const file = files[i];
                const url = URL.createObjectURL(file);
                const id = 'custom_img_' + Date.now() + '_' + i;
                imageBlobUrls[id] = url;
                
                exportedData.chapters.push({
                    id: id,
                    title: file.name.split('.')[0],
                    date: new Date().toLocaleDateString('ja-JP'),
                    blocks: '',
                    images: [id]
                });
            }
            
            document.getElementById('btn-print').removeAttribute('disabled');
            document.getElementById('btn-export-pdf').removeAttribute('disabled');
            document.getElementById('guide-card').style.display = 'none';
            renderPreview();
        }

        async function selectSyncFolder() {
            try {
                dirHandle = await window.showDirectoryPicker();
                await loadDataFromDirHandle();
            } catch (e) {
                if (e.name !== 'AbortError') alert("フォルダの読み込みに失敗しました"); 
            }
        }

        async function loadDataFromDirHandle() {
            try {
                const fileHandle = await dirHandle.getFileHandle('smartprint_export_data.json');
                const dataText = await (await fileHandle.getFile()).text();
                const newData = JSON.parse(dataText);
                
                if(!exportedData) {
                    exportedData = newData;
                } else {
                    exportedData.chapters = exportedData.chapters.concat(newData.chapters);
                }
                
                try { 
                    const originalsHandle = await dirHandle.getDirectoryHandle('originals'); 
                    await prefetchImagesFromList(originalsHandle, newData);
                } catch(e){}
                
                document.getElementById('btn-print').removeAttribute('disabled');
                document.getElementById('btn-export-pdf').removeAttribute('disabled');
                document.getElementById('guide-card').style.display = 'none';
                renderPreview();
            } catch (e) {
                console.error(e);
                alert("データが見つかりません。");
            }
        }

        async function prefetchImagesFromList(originalsHandle, data) {
            for (const chapter of data.chapters) {
                if (chapter.images) {
                    for (const imgName of chapter.images) {
                        if (imgName.startsWith('custom_img_')) continue;
                        const cleanName = imgName.replace('originals/', '');
                        if (!imageBlobUrls[imgName]) {
                            try {
                                const file = await (await originalsHandle.getFileHandle(cleanName)).getFile();
                                imageBlobUrls[imgName] = URL.createObjectURL(file);
                            } catch (e){}
                        }
                    }
                }
            }
        }

        function changeOrientation(orient) {
            currentOrientation = orient;
            document.querySelectorAll('.orient-btn').forEach(btn => btn.className = "orient-btn border border-slate-200 text-slate-600 py-2 rounded-xl text-xs font-medium transition-all");
            document.getElementById(`orient-btn-${orient}`).className = "orient-btn border-2 border-indigo-600 bg-indigo-50 text-indigo-900 py-2 rounded-xl text-xs font-bold transition-all";
            renderPreview();
        }

        function toggleCellText(cid) {
            if (cellTextVisibility[cid] === undefined) {
                cellTextVisibility[cid] = false; 
            } else {
                cellTextVisibility[cid] = !cellTextVisibility[cid]; 
            }
            renderPreview();
        }

        function changeCellFontSize(cid, delta) {
            if (!cellFontSize[cid]) {
                cellFontSize[cid] = parseInt(document.getElementById('input-font-size').value);
            }
            cellFontSize[cid] += delta;
            if(cellFontSize[cid] < 8) cellFontSize[cid] = 8;
            if(cellFontSize[cid] > 72) cellFontSize[cid] = 72;
            updateLayoutStyles();
        }

        function cycleCellRatio(cid) {
            const ratios = ["1:1", "2:1", "3:1", "1:2", "1:3", "1:4"];
            let current = cellRatio[cid] || document.getElementById('input-box-ratio').value;
            let idx = ratios.indexOf(current);
            if (idx === -1) idx = 0;
            cellRatio[cid] = ratios[(idx + 1) % ratios.length];
            renderPreview();
        }

        function cycleCellLayout(cid) {
            const layouts = ["text-top", "text-left", "img-top", "img-left"];
            let current = cellLayout[cid] || document.getElementById('input-layout-mode').value;
            let idx = layouts.indexOf(current);
            if (idx === -1) idx = 0;
            cellLayout[cid] = layouts[(idx + 1) % layouts.length];
            renderPreview();
        }

        function moveChapter(globalIndex, direction) {
            if (!exportedData || !exportedData.chapters) return;
            const targetIndex = globalIndex + direction;
            if (targetIndex < 0 || targetIndex >= exportedData.chapters.length) return;
            
            const temp = exportedData.chapters[globalIndex];
            exportedData.chapters[globalIndex] = exportedData.chapters[targetIndex];
            exportedData.chapters[targetIndex] = temp;
            
            renderPreview();
        }

        function renderPreview() {
            const container = document.getElementById('preview-container');
            container.innerHTML = '';
            if (!exportedData || !exportedData.chapters) return;

            const daysPerPage = parseInt(document.getElementById('input-days-per-page').value);
            const showTitle = document.getElementById('switch-show-title').checked;
            const showText = document.getElementById('switch-show-text').checked;
            const showFooter = document.getElementById('switch-show-footer').checked;
            const globalLayoutMode = document.getElementById('input-layout-mode').value;
            
            const titleSize = document.getElementById('input-title-size').value;
            const globalBoxRatio = document.getElementById('input-box-ratio').value;
            
            const isFrameMask = (currentTemplate === 'frame-mask');

            const chunks = [];
            for (let i = 0; i < exportedData.chapters.length; i += daysPerPage) {
                chunks.push(exportedData.chapters.slice(i, i + daysPerPage));
            }

            chunks.forEach((chunk, pageIndex) => {
                const wrapper = document.createElement('div');
                wrapper.className = "preview-wrapper no-print:mb-6 print:mb-0";
                
                const pageEl = document.createElement('div');
                pageEl.className = `paper-preview ${currentOrientation} transition-all`;

                let cols = 1, rows = 1;
                if (daysPerPage === 2) {
                    if (currentOrientation === 'portrait') { cols = 1; rows = 2; } else { cols = 2; rows = 1; }
                } else if (daysPerPage === 3) {
                    if (currentOrientation === 'portrait') { cols = 1; rows = 3; } else { cols = 3; rows = 1; }
                } else if (daysPerPage === 4) {
                    cols = 2; rows = 2; 
                } else if (daysPerPage === 6) {
                    if (currentOrientation === 'portrait') { cols = 2; rows = 3; } else { cols = 3; rows = 2; }
                } else if (daysPerPage === 9) {
                    cols = 3; rows = 3;
                }

                const gridStyle = `display: grid; grid-template-columns: repeat(${cols}, minmax(0, 1fr)); grid-template-rows: repeat(${rows}, minmax(0, 1fr)); gap: 1rem; width: 100%; height: 100%; min-height: 0;`;
                let itemsHtml = `<div style="${gridStyle}">`;

                chunk.forEach((chapter, index) => {
                    const cleanHtml = DOMPurify.sanitize(marked.parse(chapter.blocks || ''));
                    const hasImages = chapter.images && chapter.images.length > 0;
                    
                    const cid = chapter.id || `chap_${pageIndex}_${index}`;
                    const globalIdx = (pageIndex * daysPerPage) + index;
                    
                    const isTextHiddenIndividually = cellTextVisibility[cid] === false;
                    const shouldShowTextSpace = !isTextHiddenIndividually && (showTitle || showText);

                    const currentRatio = cellRatio[cid] || globalBoxRatio;
                    let textFlex = "1", imgFlex = "1";
                    if (currentRatio === "2:1") { textFlex = "2"; imgFlex = "1"; }
                    else if (currentRatio === "3:1") { textFlex = "3"; imgFlex = "1"; }
                    else if (currentRatio === "1:2") { textFlex = "1"; imgFlex = "2"; }
                    else if (currentRatio === "1:3") { textFlex = "1"; imgFlex = "3"; }
                    else if (currentRatio === "1:4") { textFlex = "1"; imgFlex = "4"; }

                    const currentLayoutMode = cellLayout[cid] || globalLayoutMode;
                    let flexFlow = "flex-col";
                    if (currentLayoutMode === 'img-top') flexFlow = "flex-col-reverse";
                    else if (currentLayoutMode === 'text-left') flexFlow = "flex-row";
                    else if (currentLayoutMode === 'img-left') flexFlow = "flex-row-reverse";

                    const textAreaClass = `flex flex-col min-h-0 min-w-0 ${!shouldShowTextSpace ? 'hidden' : ''}`;
                    const imgAreaClass = `flex items-center justify-center min-h-0 min-w-0 overflow-hidden ${!hasImages ? 'hidden' : ''}`;
                    const finalImgFlex = (!shouldShowTextSpace && hasImages) ? "1" : imgFlex;

                    let imagesHtml = '';
                    if (hasImages) {
                        imagesHtml = `<div class="${imgAreaClass} relative" style="flex: ${finalImgFlex};">`;
                        
                        if (isFrameMask) {
                            imagesHtml += `<div class="frame-wrapper" title="右下をドラッグして枠サイズ変更">`;
                            chapter.images.forEach(imgName => {
                                if (imageBlobUrls[imgName]) {
                                    imagesHtml += `<img src="${imageBlobUrls[imgName]}" class="pan-zoom-img" data-scale="1" data-tx="0" data-ty="0" style="transform: translate(0px, 0px) scale(1);" title="ドラッグで移動、ピンチ・ホイールで拡大縮小">`;
                                }
                            });
                            imagesHtml += `<div class="resize-handle no-print"></div></div>`;
                        } else {
                            imagesHtml += `<div class="flex flex-wrap gap-2 justify-center items-center h-full w-full">`;
                            chapter.images.forEach(imgName => {
                                if (imageBlobUrls[imgName]) {
                                    imagesHtml += `<img src="${imageBlobUrls[imgName]}" class="print-target-image max-w-full max-h-full object-contain rounded">`;
                                }
                            });
                            imagesHtml += `</div>`;
                        }
                        
                        imagesHtml += `</div>`;
                    }

                    let borderClass = currentTemplate === 'minimal' || isFrameMask ? "p-1" : "border border-slate-200 rounded-lg p-3 bg-white";
                    if (daysPerPage === 1 && currentTemplate !== 'minimal' && !isFrameMask) borderClass = "p-4";

                    const isFirst = globalIdx === 0;
                    const isLast = globalIdx === exportedData.chapters.length - 1;

                    const imageScaleBtns = (hasImages && isFrameMask) ? `
                        <div class="w-px bg-slate-500 mx-0.5"></div>
                        <button onclick="changeImageScale('${cid}', 0.1)" class="w-8 h-8 sm:w-6 sm:h-6 flex items-center justify-center text-white hover:bg-slate-700 rounded text-sm sm:text-xs" title="画像を拡大">
                            <i class="fa-solid fa-magnifying-glass-plus"></i>
                        </button>
                        <button onclick="changeImageScale('${cid}', -0.1)" class="w-8 h-8 sm:w-6 sm:h-6 flex items-center justify-center text-white hover:bg-slate-700 rounded text-sm sm:text-xs" title="画像を縮小">
                            <i class="fa-solid fa-magnifying-glass-minus"></i>
                        </button>
                    ` : '';

                    const toggleBtn = `
                        <div class="no-print absolute top-2 right-2 z-50 flex flex-wrap justify-end max-w-[90%] gap-1.5 sm:gap-1 bg-slate-800/80 sm:bg-slate-800/40 p-1.5 sm:p-1 rounded-md shadow-sm backdrop-blur-sm transition-opacity opacity-100 sm:opacity-40 sm:hover:opacity-100">
                            <button onclick="moveChapter(${globalIdx}, -1)" ${isFirst ? 'disabled class="w-8 h-8 sm:w-6 sm:h-6 flex items-center justify-center text-slate-500 cursor-not-allowed text-sm sm:text-xs"' : 'class="w-8 h-8 sm:w-6 sm:h-6 flex items-center justify-center text-white hover:bg-slate-700 rounded text-sm sm:text-xs"'} title="前に移動">
                                <i class="fa-solid fa-arrow-left"></i>
                            </button>
                            <button onclick="moveChapter(${globalIdx}, 1)" ${isLast ? 'disabled class="w-8 h-8 sm:w-6 sm:h-6 flex items-center justify-center text-slate-500 cursor-not-allowed text-sm sm:text-xs"' : 'class="w-8 h-8 sm:w-6 sm:h-6 flex items-center justify-center text-white hover:bg-slate-700 rounded text-sm sm:text-xs"'} title="後に移動">
                                <i class="fa-solid fa-arrow-right"></i>
                            </button>
                            <div class="w-px bg-slate-500 mx-0.5"></div>
                            <button onclick="cycleCellLayout('${cid}')" class="w-8 h-8 sm:w-6 sm:h-6 flex items-center justify-center text-white hover:bg-slate-700 rounded text-sm sm:text-xs" title="入力欄の位置(縦横)を変更">
                                <i class="fa-solid fa-rotate-right"></i>
                            </button>
                            <div class="w-px bg-slate-500 mx-0.5"></div>
                            <button onclick="cycleCellRatio('${cid}')" class="w-8 h-8 sm:w-6 sm:h-6 flex items-center justify-center text-white hover:bg-slate-700 rounded text-sm sm:text-xs" title="入力欄と画像の比率を変更">
                                <i class="fa-solid fa-arrows-left-right"></i>
                            </button>
                            <div class="w-px bg-slate-500 mx-0.5"></div>
                            <button onclick="changeCellFontSize('${cid}', -2)" class="w-8 h-8 sm:w-6 sm:h-6 flex items-center justify-center text-white hover:bg-slate-700 rounded text-sm sm:text-xs font-bold" title="文字を小さく">A-</button>
                            <button onclick="changeCellFontSize('${cid}', 2)" class="w-8 h-8 sm:w-6 sm:h-6 flex items-center justify-center text-white hover:bg-slate-700 rounded text-sm sm:text-xs font-bold" title="文字を大きく">A+</button>
                            ${imageScaleBtns}
                            <div class="w-px bg-slate-500 mx-0.5"></div>
                            <button onclick="toggleCellText('${cid}')" class="w-8 h-8 sm:w-6 sm:h-6 flex items-center justify-center text-white hover:bg-slate-700 rounded text-sm sm:text-xs" title="${isTextHiddenIndividually ? 'テキストを表示' : 'テキストを隠す'}">
                                <i class="fa-solid ${isTextHiddenIndividually ? 'fa-eye' : 'fa-eye-slash'}"></i>
                            </button>
                        </div>
                    `;

                    itemsHtml += `
                        <div class="grid-cell-box relative flex flex-col overflow-hidden w-full h-full min-h-0 ${borderClass}" data-cid="${cid}">
                            ${toggleBtn}
                            <div class="flex ${flexFlow} h-full w-full gap-3 overflow-hidden min-h-0">
                                <div class="${textAreaClass}" style="flex: ${textFlex};">
                                    ${showTitle ? `
                                    <div class="header-line border-b border-slate-300 pb-1 mb-2 flex justify-between items-baseline shrink-0">
                                        <h2 contenteditable="true" class="font-bold text-slate-900 focus:outline-none truncate" style="font-size: ${titleSize}; line-height: 1.3;">${chapter.title || '無題'}</h2>
                                        <span contenteditable="true" class="text-xs text-slate-500 focus:outline-none whitespace-nowrap ml-2">${chapter.date ? chapter.date.replace(/-/g, '/') : ''}</span>
                                    </div>` : ''}
                                    ${showText ? `
                                    <div contenteditable="true" class="article-body flex-1 overflow-hidden min-h-0 text-sm leading-relaxed focus:outline-none">
                                        ${cleanHtml}
                                    </div>` : ''}
                                </div>
                                ${imagesHtml}
                            </div>
                        </div>
                    `;
                });

                itemsHtml += `</div>`;

                pageEl.innerHTML = `
                    <div class="flex flex-col h-full w-full flex-1 min-h-0 p-4" style="box-sizing: border-box;">
                        ${itemsHtml}
                        ${showFooter ? `
                        <div class="mt-2 text-center text-xs text-slate-400 shrink-0 flex justify-center border-t border-slate-200 pt-1">
                            <span contenteditable="true" oninput="updateAllFooters(this)" class="focus:outline-none px-4 py-0.5 rounded border border-transparent hover:border-slate-300 text-[11px] tracking-wide max-w-full truncate min-w-[100px]">${footerCustomText}</span>
                        </div>
                        ` : ''}
                    </div>
                `;

                wrapper.appendChild(pageEl);
                container.appendChild(wrapper);
            });

            applyTemplateStyles();
            updateLayoutStyles();
            initPanZoom(); 
            initResizeHandles(); 
            setTimeout(adjustResponsiveScale, 50);
        }
        
        let pzActiveImg = null, pzIsDragging = false;
        let pzStartX, pzStartY, pzInitialX, pzInitialY;

        function initPanZoom() {
            document.querySelectorAll('.pan-zoom-img').forEach(img => {
                if(img.dataset.pzInit) return;
                img.dataset.pzInit = "true";

                let evCache = [];
                let prevDiff = -1;

                img.addEventListener('wheel', (e) => {
                    e.preventDefault();
                    let scale = parseFloat(img.dataset.scale || 1);
                    scale += e.deltaY * -0.002;
                    scale = Math.min(Math.max(0.1, scale), 10);
                    img.dataset.scale = scale;
                    img.style.transform = `translate(${img.dataset.tx || 0}px, ${img.dataset.ty || 0}px) scale(${scale})`;
                });

                img.addEventListener('pointerdown', (e) => {
                    evCache.push(e);
                    img.setPointerCapture(e.pointerId);
                    
                    if (evCache.length === 1) {
                        pzIsDragging = true;
                        pzActiveImg = img;
                        pzStartX = e.clientX;
                        pzStartY = e.clientY;
                        pzInitialX = parseFloat(img.dataset.tx || 0);
                        pzInitialY = parseFloat(img.dataset.ty || 0);
                    }
                });

                img.addEventListener('pointermove', (e) => {
                    const index = evCache.findIndex(ev => ev.pointerId === e.pointerId);
                    if (index !== -1) evCache[index] = e;

                    if (evCache.length === 2) {
                        const curDiff = Math.hypot(evCache[0].clientX - evCache[1].clientX, evCache[0].clientY - evCache[1].clientY);
                        if (prevDiff > 0) {
                            let scale = parseFloat(img.dataset.scale || 1);
                            scale += (curDiff - prevDiff) * 0.005;
                            scale = Math.min(Math.max(0.1, scale), 10);
                            img.dataset.scale = scale;
                            img.style.transform = `translate(${img.dataset.tx || 0}px, ${img.dataset.ty || 0}px) scale(${scale})`;
                        }
                        prevDiff = curDiff;
                    } else if (pzIsDragging && pzActiveImg === img && evCache.length === 1) {
                        const dx = e.clientX - pzStartX;
                        const dy = e.clientY - pzStartY;
                        img.dataset.tx = pzInitialX + dx;
                        img.dataset.ty = pzInitialY + dy;
                        img.style.transform = `translate(${img.dataset.tx}px, ${img.dataset.ty}px) scale(${img.dataset.scale || 1})`;
                    }
                });

                const handlePointerUp = (e) => {
                    const index = evCache.findIndex(ev => ev.pointerId === e.pointerId);
                    if (index !== -1) evCache.splice(index, 1);
                    
                    if (evCache.length < 2) {
                        prevDiff = -1;
                    }
                    if (evCache.length === 0) {
                        pzIsDragging = false;
                        pzActiveImg = null;
                    } else if (evCache.length === 1) {
                        pzStartX = evCache[0].clientX;
                        pzStartY = evCache[0].clientY;
                        pzInitialX = parseFloat(img.dataset.tx || 0);
                        pzInitialY = parseFloat(img.dataset.ty || 0);
                    }
                };

                img.addEventListener('pointerup', handlePointerUp);
                img.addEventListener('pointercancel', handlePointerUp);
            });
        }

        function changeImageScale(cid, delta) {
            const cell = document.querySelector(`[data-cid="${cid}"]`);
            if (!cell) return;
            const img = cell.querySelector('.pan-zoom-img');
            if (!img) return;

            let scale = parseFloat(img.dataset.scale || 1);
            scale += delta;
            scale = Math.min(Math.max(0.1, scale), 10);
            img.dataset.scale = scale;

            const tx = img.dataset.tx || 0;
            const ty = img.dataset.ty || 0;
            img.style.transform = `translate(${tx}px, ${ty}px) scale(${scale})`;
        }

        let pzResizeActiveHandle = null;
        let pzResizeStartX, pzResizeStartY, pzResizeStartW, pzResizeStartH, pzResizeTarget;

        function initResizeHandles() {
            document.querySelectorAll('.resize-handle').forEach(handle => {
                if(handle.dataset.resizeInit) return;
                handle.dataset.resizeInit = "true";

                handle.addEventListener('pointerdown', (e) => {
                    e.stopPropagation(); 
                    pzResizeActiveHandle = handle;
                    pzResizeTarget = handle.parentElement;

                    pzResizeStartX = e.clientX;
                    pzResizeStartY = e.clientY;
                    pzResizeStartW = pzResizeTarget.clientWidth;
                    pzResizeStartH = pzResizeTarget.clientHeight;

                    handle.setPointerCapture(e.pointerId);
                });

               handle.addEventListener('pointermove', (e) => {
                    if (pzResizeActiveHandle !== handle || !pzResizeTarget) return;
                    e.stopPropagation();

                    const dx = e.clientX - pzResizeStartX;
                    const dy = e.clientY - pzResizeStartY;

                    let scale = 1;
                    const page = handle.closest('.paper-preview');
                    if (page && page.style.transform && page.style.transform.includes('scale')) {
                        const match = page.style.transform.match(/scale\(([^)]+)\)/);
                        if (match) scale = parseFloat(match[1]);
                    }

                    const newW = pzResizeStartW + (dx / scale);
                    const newH = pzResizeStartH + (dy / scale);

                    const parentW = pzResizeTarget.parentElement.clientWidth;
                    const parentH = pzResizeTarget.parentElement.clientHeight;

                    if (newW > 40 && newW <= parentW) pzResizeTarget.style.width = `${newW}px`;
                    if (newH > 40 && newH <= parentH) pzResizeTarget.style.height = `${newH}px`;
                });
                handle.addEventListener('pointerup', (e) => {
                    if (pzResizeActiveHandle === handle) {
                        handle.releasePointerCapture(e.pointerId);
                        pzResizeActiveHandle = null;
                        pzResizeTarget = null;
                    }
                });
            });
        }

        function updateAllFooters(element) {
            footerCustomText = element.innerText;
            const footers = document.querySelectorAll('.paper-preview border-t + div > span, .paper-preview div.border-t > span[contenteditable="true"]');
            footers.forEach(f => {
                if (f !== element) f.innerText = footerCustomText;
            });
        }

        function changeTemplate(type) {
            currentTemplate = type;
            renderPreview();
        }

        function applyTemplateStyles() {
            const pages = document.querySelectorAll('.paper-preview');
            pages.forEach(page => {
                page.classList.remove('tmpl-mincho', 'tmpl-japanese-modern', 'tmpl-frame-mask');
                if (currentTemplate === 'elegant') page.classList.add('tmpl-mincho');
                if (currentTemplate === 'modern-jp') page.classList.add('tmpl-japanese-modern');
                if (currentTemplate === 'frame-mask') page.classList.add('tmpl-frame-mask');
            });
        }

        function updateLayoutStyles() {
            const fontSize = document.getElementById('input-font-size').value;
            const padding = document.getElementById('input-padding').value;
            document.getElementById('val-font-size').innerText = fontSize + 'px';
            document.getElementById('val-padding').innerText = padding + 'mm';

            document.querySelectorAll('.paper-preview > div').forEach(wrap => wrap.style.padding = `${padding}mm`);
            
            document.querySelectorAll('.grid-cell-box').forEach(cell => {
                const cid = cell.dataset.cid;
                const art = cell.querySelector('.article-body');
                if (art) {
                    const size = cellFontSize[cid] || fontSize;
                    art.style.fontSize = `${size}px`;
                }
            });
            
            adjustResponsiveScale();
        }

        function adjustResponsiveScale() {
            if (window.matchMedia('(max-print)').matches) return;
            const mainArea = document.getElementById('preview-main-area');
            if (!mainArea) return;

            const availWidth = mainArea.clientWidth - 32; 
            document.querySelectorAll('.preview-wrapper').forEach(wrapper => {
                const page = wrapper.querySelector('.paper-preview');
                if (!page) return;

                const baseW = currentOrientation === 'landscape' ? 297 * 3.7795 : 210 * 3.7795;
                const baseH = currentOrientation === 'landscape' ? 210 * 3.7795 : 297 * 3.7795;

                if (availWidth < baseW) {
                    const scale = availWidth / baseW;
                    page.style.transform = `scale(${scale})`;
                    wrapper.style.height = `${(baseH * scale) + 20}px`;
                } else {
                    page.style.transform = 'none';
                    wrapper.style.height = `${baseH + 20}px`;
                }
            });
        }

        window.addEventListener('resize', adjustResponsiveScale);

        async function exportDirectPDF() {
            const btn = document.getElementById('btn-export-pdf');
            const originalText = btn.innerHTML;
            
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin sm:mr-2"></i><span class="hidden sm:inline">生成中...</span>';
            btn.disabled = true;
            window.scrollTo(0, 0);

            const container = document.getElementById('preview-container');
            const originalClasses = container.className;
            container.className = "w-full"; 

            const wrappers = document.querySelectorAll('.preview-wrapper');
            const pages = document.querySelectorAll('.paper-preview');
            
            const noPrintElements = container.querySelectorAll('.no-print');
            noPrintElements.forEach(el => el.style.display = 'none');
            
            wrappers.forEach((w, index) => {
                w.style.height = 'auto';
                w.style.margin = '0px'; 
                w.style.padding = '0px';
                
                if (index < wrappers.length - 1) {
                    w.style.pageBreakAfter = 'always';
                } else {
                    w.style.pageBreakAfter = 'auto';
                }
                w.style.pageBreakInside = 'avoid';
            });
            
            pages.forEach(p => {
                p.style.transform = 'none';
                p.style.boxShadow = 'none';
                p.style.height = currentOrientation === 'portrait' ? '296mm' : '209mm';
                p.style.width = currentOrientation === 'portrait' ? '210mm' : '297mm';
                p.style.overflow = 'hidden';
                p.style.boxSizing = 'border-box';
            });

            const opt = {
                margin:       0,
                filename:     `SmartDiary_${new Date().getTime()}.pdf`,
                image:        { type: 'jpeg', quality: 0.98 },
                html2canvas:  { scale: 2, useCORS: true, scrollY: 0 },
                jsPDF:        { unit: 'mm', format: 'a4', orientation: currentOrientation },
                pagebreak:    { mode: 'css', avoid: '.paper-preview' }
            };

            try {
                await html2pdf().set(opt).from(container).save();
            } catch (error) {
                console.error("PDF生成エラー:", error);
                alert("PDFの生成に失敗しました。");
            } finally {
                container.className = originalClasses;
                noPrintElements.forEach(el => el.style.display = '');

                wrappers.forEach(w => {
                    w.style.margin = '';
                    w.style.padding = '';
                    w.style.pageBreakAfter = '';
                    w.style.pageBreakInside = '';
                });
                pages.forEach(p => {
                    p.style.height = '';
                    p.style.width = '';
                    p.style.overflow = '';
                    p.style.boxSizing = '';
                });
                adjustResponsiveScale();
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
